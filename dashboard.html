<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Inventory Dashboard — Cabitan NHS</title>
<!--
  DEPLOYING TO GITHUB PAGES:
  1. Fill in SUPABASE_URL and SUPABASE_ANON_KEY below with your real values
     BEFORE uploading (see the CONFIG section further down in the script).
  2. Rename this file to dashboard.html (or index.html if this should be
     the main page) and upload it to your GitHub repo.
  3. Repo Settings -> Pages -> Source: Deploy from a branch -> main -> / (root).
  4. Your live URL will be https://yourusername.github.io/your-repo-name/dashboard.html
  5. This page is read-only -- it only ever does GET/select requests, never
     writes anything, so the anon key here only needs SELECT access.

  REQUIRED SUPABASE SETUP (run once in the SQL editor) so the anon key can
  read these tables:

    alter table pif_records enable row level security;
    create policy "anyone can read pif records" on pif_records
      for select using (true);

    alter table supplies_data enable row level security;
    create policy "anyone can read supplies catalog" on supplies_data
      for select using (true);

    -- supply_data's anon SELECT policy should already exist from the
    -- Stock Check page setup. If not:
    alter table supply_data enable row level security;
    create policy "anyone can read stock" on supply_data
      for select using (true);
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16233D; --paper:#FAF7F0; --paper-raised:#FFFFFF; --slate:#64748B; --hair:#E4DFD3;
    --green:#2F7A4D; --green-bg:#E8F3EC;
    --amber:#C77C1D; --amber-bg:#FBEEDC;
    --rust:#B4402A; --rust-bg:#F8E8E4;
    --blue:#2E5AAC; --blue-bg:#E7EDF9;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important; transition-duration:.01ms !important;} }
  html,body{margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:'Inter',system-ui,sans-serif;}
  .app{max-width:920px; margin:0 auto; padding:0 0 40px;}

  header{background:var(--ink); color:var(--paper); padding:22px 20px 20px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8FA3C9; margin:0 0 4px;}
  .title-row{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:6px;}
  h1{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:24px; margin:0; letter-spacing:-0.01em;}
  #lastUpdated{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8FA3C9;}

  section{padding:20px;}
  h2{font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; margin:0 0 12px; display:flex; align-items:center; gap:8px;}
  h2 .dot{width:7px; height:7px; border-radius:50%; background:var(--blue); display:inline-block;}

  /* ---- PIF distribution tiles ---- */
  .tiles{display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:10px;}
  .tile{background:var(--paper-raised); border:1px solid var(--hair); border-radius:12px; padding:14px 16px; animation:rise .3s ease backwards;}
  .tile-count{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:26px; color:var(--ink);}
  .tile-label{font-size:12px; color:var(--slate); margin-top:2px;}

  /* ---- Supplies status ---- */
  .list{display:flex; flex-direction:column; gap:8px;}
  .row{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    background:var(--paper-raised); border:1px solid var(--hair); border-radius:10px;
    padding:11px 14px; animation:rise .3s ease backwards;
  }
  .row .n{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14.5px;}
  .row .loc{font-size:11.5px; color:var(--slate); margin-top:1px;}
  .row .right{display:flex; align-items:center; gap:10px;}
  .qty{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:17px;}
  .badge{font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; padding:3px 8px; border-radius:99px; white-space:nowrap;}
  .badge.ok{background:var(--green-bg); color:var(--green);}
  .badge.low{background:var(--amber-bg); color:var(--amber);}
  .badge.critical{background:var(--rust-bg); color:var(--rust);}

  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ---- Recent activity ticker ---- */
  .ticker-wrap{
    background:var(--ink); border-radius:12px; padding:12px 0; overflow:hidden; position:relative;
  }
  .ticker-track{display:flex; gap:36px; white-space:nowrap; animation:scroll 30s linear infinite; padding-left:100%;}
  .ticker-track span{font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--paper);}
  .ticker-track span strong{color:#8FA3C9;}
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
  .ticker-wrap:hover .ticker-track{animation-play-state:paused;}

  .empty, #globalStatus{text-align:center; color:var(--slate); font-size:13.5px; padding:20px;}
  footer{text-align:center; padding:10px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--slate); letter-spacing:.03em;}
</style>
</head>
<body>
<div class="app">
  <header>
    <p class="eyebrow">Cabitan NHS · Live Overview</p>
    <div class="title-row">
      <h1>Inventory Dashboard</h1>
      <span id="lastUpdated">Loading…</span>
    </div>
  </header>

  <div id="globalStatus" style="display:none;"></div>

  <section id="pifSection">
    <h2><span class="dot"></span>Asset Classification (PIF Records)</h2>
    <div class="tiles" id="pifTiles"></div>
  </section>

  <section id="suppliesSection">
    <h2><span class="dot" style="background:var(--green);"></span>Supplies Status</h2>
    <div class="list" id="suppliesList"></div>
  </section>

  <section id="activitySection">
    <h2><span class="dot" style="background:var(--amber);"></span>Recent Activity</h2>
    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </section>

  <footer>READ-ONLY VIEW · REFRESHES EVERY 30 SECONDS</footer>
</div>

<script>
// ======================= CONFIG =======================
// Fill these in with your real Supabase project values before deploying.
// This is the anon/public key -- never the service_role key. This page only
// ever performs SELECT requests, so the anon key here only needs read access
// (see the RLS policies in the comment at the top of this file).
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-KEY";
const REFRESH_MS = 30000;
// =======================================================

const $ = (id) => document.getElementById(id);

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function statusFor(qty) {
  if (qty < 4) return { cls: 'critical', label: 'Critical' };
  if (qty <= 5) return { cls: 'low', label: 'Low' };
  return { cls: 'ok', label: 'OK' };
}

async function supaGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || body.hint || `${path} failed (${res.status})`);
  }
  return res.json();
}

// ---------- 1. PIF asset classification ----------
async function loadPifDistribution() {
  const rows = await supaGet('pif_records?select=classification&deleted=eq.false');
  const counts = {};
  for (const r of rows) {
    const k = r.classification || 'Unclassified';
    counts[k] = (counts[k] || 0) + 1;
  }
  const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const el = $('pifTiles');
  el.innerHTML = entries.length
    ? entries.map(([label, count], i) => `
        <div class="tile" style="animation-delay:${i * 40}ms">
          <div class="tile-count">${count}</div>
          <div class="tile-label">${escapeHtml(label)}</div>
        </div>
      `).join('')
    : `<div class="empty">No PIF records yet.</div>`;
}

// ---------- 2. Supplies status (stock per product + location) ----------
async function loadSuppliesStatus() {
  const [catalog, transactions] = await Promise.all([
    supaGet('supplies_data?select=name,location&deleted=eq.false'),
    supaGet('supply_data?select=name,quantity,status&deleted=eq.false'),
  ]);

  const stockByName = {};
  for (const t of transactions) {
    stockByName[t.name] = (stockByName[t.name] || 0) + (t.status === 'In' ? Number(t.quantity) : -Number(t.quantity));
  }

  const rows = catalog
    .map(c => ({ name: c.name, location: c.location, qty: stockByName[c.name] || 0 }))
    .sort((a, b) => a.name.localeCompare(b.name));

  const el = $('suppliesList');
  el.innerHTML = rows.length
    ? rows.map((r, i) => {
        const st = statusFor(r.qty);
        return `
          <div class="row" style="animation-delay:${i * 25}ms">
            <div>
              <div class="n">${escapeHtml(r.name)}</div>
              <div class="loc">${escapeHtml(r.location || 'Location not set')}</div>
            </div>
            <div class="right">
              <span class="badge ${st.cls}">${st.label}</span>
              <span class="qty">${r.qty}</span>
            </div>
          </div>
        `;
      }).join('')
    : `<div class="empty">No supplies catalog entries yet.</div>`;
}

// ---------- 3. Recent activity ticker ----------
async function loadRecentActivity() {
  const rows = await supaGet(
    'supply_data?select=receiver,name,status,updated_at&deleted=eq.false&status=eq.Out&order=updated_at.desc&limit=15'
  );
  const track = $('tickerTrack');
  track.innerHTML = rows.length
    ? rows.map(r => `<span><strong>${escapeHtml(r.receiver || 'Unknown')}</strong> received ${escapeHtml(r.name)}</span>`).join('')
    : `<span>No recent activity.</span>`;
}

// ---------- Orchestration ----------
async function refreshAll() {
  $('globalStatus').style.display = 'none';
  try {
    await Promise.all([loadPifDistribution(), loadSuppliesStatus(), loadRecentActivity()]);
    $('lastUpdated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    $('globalStatus').style.display = 'block';
    $('globalStatus').textContent = `Couldn't load dashboard data: ${e.message}. Check SUPABASE_URL/ANON_KEY and that the required SELECT policies are in place.`;
    $('lastUpdated').textContent = 'Connection error';
  }
}

refreshAll();
setInterval(refreshAll, REFRESH_MS);
</script>
</body>
</html>
